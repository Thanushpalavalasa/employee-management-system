name: Employee App CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_TOKEN }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build Backend with Maven
        run: |
          cd backend
          mvn clean package -DskipTests

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build and Push Backend Image
        run: |
          IMAGE=thanushdev01/emp-backend:${{ github.sha }}
          docker build -t $IMAGE ./backend
          docker push $IMAGE

      - name: Build and Push Frontend Image
        run: |
          IMAGE=thanushdev01/emp-frontend:${{ github.sha }}
          docker build -t $IMAGE ./frontend
          docker push $IMAGE

      - name: Update Backend Image in Manifest
        run: |
          sed -i "s|image: thanushdev01/emp-backend:.*|image: thanushdev01/emp-backend:${{ github.sha }}|" manifests/backend/deployment.yaml

      - name: Update Frontend Image in Manifest
        run: |
          sed -i "s|image: thanushdev01/emp-frontend:.*|image: thanushdev01/emp-frontend:${{ github.sha }}|" manifests/frontend/deployment.yaml

      - name: Commit and Push Manifest Changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add manifests/backend/deployment.yaml manifests/frontend/deployment.yaml
          git commit -m "Update images to ${{ github.sha }}" || echo "No changes to commit"
          git remote set-url origin https://${{ secrets.GIT_TOKEN }}@github.com/${{ github.repository }}.git
          git push
