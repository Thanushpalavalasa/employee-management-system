name: Employee App CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_TOKEN }}

      # Step 2: Set up Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Step 3: Build Spring Boot backend
      - name: Build Backend with Maven
        run: |
          cd backend
          mvn clean package -DskipTests

      # Step 4: Login to DockerHub
      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASS }}" | docker login -u ${{ secrets.DOCKER_USER }} --password-stdin

      # Step 5: Build & Push Backend image
      - name: Build and Push Backend Image
        run: |
          IMAGE=${{ secrets.DOCKER_USER }}/emp-backend:${{ github.sha }}
          docker build -t $IMAGE ./backend
          docker push $IMAGE

      # Step 6: Build & Push Frontend image
      - name: Build and Push Frontend Image
        run: |
          IMAGE=${{ secrets.DOCKER_USER }}/emp-frontend:${{ github.sha }}
          docker build -t $IMAGE ./frontend
          docker push $IMAGE

      # Step 7: Update backend deployment manifest
      - name: Update Backend Image in Manifest
        run: |
          IMAGE=${{ secrets.DOCKER_USER }}/emp-backend:${{ github.sha }}
          sed -i "s|image: ${{ secrets.DOCKER_USER }}/emp-backend:.*|image: $IMAGE|" manifests/backend/deployment.yaml

      # Step 8: Update frontend deployment manifest
      - name: Update Frontend Image in Manifest
        run: |
          IMAGE=${{ secrets.DOCKER_USER }}/emp-frontend:${{ github.sha }}
          sed -i "s|image: ${{ secrets.DOCKER_USER }}/emp-frontend:.*|image: $IMAGE|" manifests/frontend/deployment.yaml

      # Step 9: Commit and push manifest changes
      - name: Commit and Push Manifest Changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add manifests/backend/deployment.yaml manifests/frontend/deployment.yaml
          git commit -m "Update images to ${{ github.sha }}" || echo "No changes to commit"
          git remote set-url origin https://${{ secrets.GIT_TOKEN }}@github.com/${{ github.repository }}.git
          git push
